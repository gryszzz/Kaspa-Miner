name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-preflight:
    name: Release signing preflight
    runs-on: ubuntu-latest
    env:
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_APP_SIGN_IDENTITY: ${{ secrets.APPLE_APP_SIGN_IDENTITY }}
      APPLE_INSTALLER_SIGN_IDENTITY: ${{ secrets.APPLE_INSTALLER_SIGN_IDENTITY }}
      WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

    steps:
      - name: Require desktop signing credentials
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          require_secret() {
            local name="$1"
            local value="${!name:-}"
            if [[ -z "$value" ]]; then
              echo "::error::$name is required for no-warning desktop releases"
              missing=1
            fi
          }

          require_secret APPLE_CERTIFICATE_P12_BASE64
          require_secret APPLE_CERTIFICATE_PASSWORD
          require_secret APPLE_TEAM_ID
          require_secret APPLE_ID
          require_secret APPLE_APP_PASSWORD
          require_secret APPLE_APP_SIGN_IDENTITY
          require_secret APPLE_INSTALLER_SIGN_IDENTITY
          require_secret WINDOWS_CERTIFICATE_PFX_BASE64
          require_secret WINDOWS_CERTIFICATE_PASSWORD

          if [[ "$missing" -ne 0 ]]; then
            echo "Release blocked: configure Apple notarization and Windows Authenticode secrets first."
            exit 1
          fi

  build:
    name: Build / ${{ matrix.target }}
    needs: release-preflight
    runs-on: ${{ matrix.os }}
    env:
      WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            bin: kaspa-miner
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            bin: kaspa-miner.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            archive: zip
            bin: kaspa-miner.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Sign Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $certPath = Join-Path $env:RUNNER_TEMP "kaspilot-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX_BASE64))
          $securePassword = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          $cert = Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword |
            Where-Object { $_.HasPrivateKey } |
            Select-Object -First 1
          if ($null -eq $cert) {
            throw "No private-key certificate was imported from the PFX"
          }
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName |
            Select-Object -Last 1
          if ($null -eq $signtool) {
            throw "signtool.exe was not found"
          }
          $binary = "target/${{ matrix.target }}/release/${{ matrix.bin }}"
          & $signtool.FullName sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /sha1 $cert.Thumbprint $binary
          & $signtool.FullName verify /pa /v $binary

      - name: Stage package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p package dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" package/
          cp README.md start-mining.toml config.example.toml fleet.example.toml package/
          case "${{ matrix.target }}" in
            *windows-msvc)
              cp install-windows.cmd install-windows.ps1 package/
              ;;
          esac

      - name: Package tarball
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          tar -C package -czf "dist/kaspa-miner-${{ matrix.target }}.tar.gz" .

      - name: Package zip
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path package/* -DestinationPath "dist/kaspa-miner-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaspa-miner-${{ matrix.target }}
          path: dist/*

  macos-universal:
    name: Build / macos-universal
    needs: release-preflight
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_APP_SIGN_IDENTITY: ${{ secrets.APPLE_APP_SIGN_IDENTITY }}
      APPLE_INSTALLER_SIGN_IDENTITY: ${{ secrets.APPLE_INSTALLER_SIGN_IDENTITY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Build Intel
        run: cargo build --locked --release --target x86_64-apple-darwin

      - name: Build Apple Silicon
        run: cargo build --locked --release --target aarch64-apple-darwin

      - name: Create universal macOS binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p package dist
          lipo -create \
            target/x86_64-apple-darwin/release/kaspa-miner \
            target/aarch64-apple-darwin/release/kaspa-miner \
            -output package/kaspa-miner
          chmod +x package/kaspa-miner

      - name: Import Apple signing certificates
        if: env.APPLE_CERTIFICATE_P12_BASE64 != '' && env.APPLE_CERTIFICATE_PASSWORD != ''
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/kaspilot-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          CERTIFICATE_PATH="$RUNNER_TEMP/apple-signing.p12"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Sign universal macOS binary with Developer ID
        shell: bash
        run: |
          set -euo pipefail
          codesign --force --options runtime --timestamp --sign "$APPLE_APP_SIGN_IDENTITY" package/kaspa-miner
          codesign --verify --verbose=4 package/kaspa-miner

      - name: Build signed macOS installer package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          fi
          mkdir -p pkg-root/usr/local/bin pkg-root/usr/local/share/kaspilot
          cp package/kaspa-miner pkg-root/usr/local/bin/kaspa-miner
          cp README.md start-mining.toml config.example.toml fleet.example.toml pkg-root/usr/local/share/kaspilot/
          pkgbuild \
            --root pkg-root \
            --identifier com.gryszzz.kaspilot \
            --version "$VERSION" \
            --install-location / \
            --sign "$APPLE_INSTALLER_SIGN_IDENTITY" \
            dist/kaspa-miner-macos-universal.pkg
          pkgutil --check-signature dist/kaspa-miner-macos-universal.pkg

      - name: Notarize and staple macOS installer package
        shell: bash
        run: |
          set -euo pipefail
          PKG="dist/kaspa-miner-macos-universal.pkg"
          xcrun notarytool submit "$PKG" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple "$PKG"
          xcrun stapler validate "$PKG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaspa-miner-macos-universal
          path: dist/*

  publish:
    name: Publish GitHub release
    needs: [build, macos-universal]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
