name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            bin: kaspa-miner
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
            bin: kaspa-miner
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            bin: kaspa-miner
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            bin: kaspa-miner.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Stage package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p package dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" package/
          cp README.md config.example.toml fleet.example.toml package/

      - name: Package tarball
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          tar -C package -czf "dist/kaspa-miner-${{ matrix.target }}.tar.gz" .

      - name: Package zip
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path package/* -DestinationPath "dist/kaspa-miner-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaspa-miner-${{ matrix.target }}
          path: dist/*

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
